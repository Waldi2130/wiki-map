<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WikiКарта">
<meta name="theme-color" content="#1976d2">
<title>Карта Википедии</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
  :root {
    --accent: #1976d2;
    --accent-photos: #e67e22;
    --accent-time: #8e44ad;
    --bg-card: rgba(255, 255, 255, 0.96);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.18);
    --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.22);
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }
  #map { position: absolute; inset: 0; background: #e8e8e8; }

  /* --- Top-right control stack --- */
  .controls {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    right: 14px;
    z-index: 1000;
    display: flex; flex-direction: column; gap: 8px;
  }
  .btn {
    background: var(--bg-card);
    border: none;
    padding: 10px 14px;
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    font-size: 14px; font-weight: 500;
    user-select: none;
    transition: transform 0.08s, background 0.15s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    min-width: 130px;
    text-align: left;
  }
  .btn:active { background: #eaeaea; transform: scale(0.97); }
  .btn.active { background: var(--accent); color: white; }
  .btn#photos-toggle.active { background: var(--accent-photos); color: white; }
  .btn#time-toggle.active   { background: var(--accent-time);   color: white; }

  /* --- Status banner (bottom centered) --- */
  .status {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    left: 16px; right: 16px;
    z-index: 1000;
    background: rgba(20, 20, 20, 0.85);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px; text-align: center;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .status.hidden { opacity: 0; }

  /* --- Time-machine bottom panel --- */
  .time-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 999;
    background: var(--bg-card);
    box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.15);
    padding: 14px 16px calc(env(safe-area-inset-bottom, 0px) + 14px);
    transform: translateY(105%);
    transition: transform 0.3s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .time-panel.open { transform: translateY(0); }
  .time-panel h4 {
    margin: 0 0 10px;
    font-size: 14px; color: var(--accent-time); font-weight: 600;
  }
  .time-row {
    display: grid;
    grid-template-columns: 30px 1fr 90px;
    align-items: center;
    gap: 10px;
    margin: 6px 0;
    font-size: 13px;
  }
  .time-row input[type="range"] {
    width: 100%;
    accent-color: var(--accent-time);
  }
  .time-row .label-out {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: #444;
  }

  /* --- Marker icons --- */
  .photo-marker { background: transparent; border: none; }
  .photo-pin {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent-photos);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: var(--shadow-sm);
    border: 2px solid white;
  }
  .time-marker { background: transparent; border: none; }
  .time-pin {
    background: var(--accent-time);
    color: white;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 11px; font-weight: 700;
    box-shadow: var(--shadow-sm);
    border: 2px solid white;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .anchor-marker {
    background: transparent; border: none;
    font-size: 28px;
    text-align: center;
    line-height: 36px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  /* --- Cluster bubble styling --- */
  .cluster {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-weight: 700; font-size: 13px;
    box-shadow: var(--shadow-sm);
    border: 3px solid white;
  }
  .cluster-wiki { background: var(--accent); }
  .cluster-photos { background: var(--accent-photos); }
  .cluster-time { background: var(--accent-time); }

  /* --- Popups --- */
  .leaflet-popup-content { margin: 12px 14px; }
  .popup { max-width: 280px; }
  .popup img {
    width: 100%; max-height: 180px; object-fit: cover;
    border-radius: 8px; margin-bottom: 8px;
    display: block; background: #eee;
  }
  .popup h3 {
    margin: 4px 0 6px;
    font-size: 15px; line-height: 1.25;
  }
  .popup p {
    margin: 4px 0 6px;
    font-size: 13px; line-height: 1.4; color: #222;
  }
  .popup .meta { color: #666; font-size: 12px; }
  .popup a {
    color: var(--accent);
    font-size: 13px;
    text-decoration: none;
    font-weight: 500;
    display: inline-block;
    margin-top: 4px;
  }
  .popup .skeleton { color: #888; font-style: italic; }

  /* --- Координаты в попапе + кнопка копирования --- */
  .coords {
    background: #f5f5f7;
    border-radius: 8px;
    padding: 6px 10px;
    margin: 8px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .coord-text {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: #222;
    user-select: all;
    -webkit-user-select: all;
  }
  .copy-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .copy-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<div id="map"></div>

<div class="controls">
  <button class="btn" id="locate">📍 Где я</button>
  <button class="btn" id="photos-toggle">📷 Старые фото</button>
  <button class="btn" id="time-toggle">🕐 Эпоха</button>
</div>

<div class="time-panel" id="time-panel" aria-hidden="true">
  <h4>🕐 Машина времени</h4>
  <div class="time-row">
    <span>От</span>
    <input type="range" id="time-from" min="-500" max="2025" step="50" value="1000">
    <span class="label-out" id="time-from-label">1000</span>
  </div>
  <div class="time-row">
    <span>До</span>
    <input type="range" id="time-to" min="-500" max="2025" step="50" value="2025">
    <span class="label-out" id="time-to-label">2025</span>
  </div>
</div>

<div class="status hidden" id="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="app.js?v=2"></script>
</body>
</html>
